<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Professional</title>
    <meta name="description" content="Generate beautiful QR codes instantly.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container">
        <div class="glass-panel">
            <header>
                <h1>QR Generator</h1>
                <p>Turn any text or link into a QR code instantly.</p>
            </header>
            
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="qr-input" placeholder="Enter text or URL here..." autocomplete="off">
                </div>
                
                <div class="settings-row">
                    <div class="setting-group">
                        <label for="redundancy-sel">Correction Level</label>
                        <select id="redundancy-sel">
                            <option value="L">Low (7%)</option>
                            <option value="M">Medium (15%)</option>
                            <option value="Q">Quartile (25%)</option>
                            <option value="H" selected>High (30%)</option>
                        </select>
                    </div>
                    
                    <div class="setting-group logo-setting">
                        <label>Logo</label>
                        <div class="logo-upload-wrapper">
                            <input type="file" id="logo-input" accept="image/*" hidden>
                            <button id="add-logo-btn" class="icon-btn" title="Add Logo image">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"></line>
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <div id="logo-preview" class="hidden">
                                <img src="" alt="logo preview">
                                <button id="remove-logo" title="Remove logo">×</button>
                            </div>
                        </div>
                    </div>
                </div>

                <button id="generate-btn" class="primary-btn">
                    <span>Generate QR</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                        <path d="M12 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>

            <div class="output-section">
                <div id="qr-container" class="qr-placeholder">
                    <div class="placeholder-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                    </div>
                </div>
                
                <div class="action-buttons hidden" id="action-buttons">
                    <button id="download-btn" class="secondary-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
